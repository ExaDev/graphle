name: Setup and Run
description: Set up pnpm + Node, install dependencies from the frozen lockfile, then run a command. Requires checkout before use. Mirrors ExaDev/dex's setup-and-run action, stripped of the caches that only apply to dex (Turbo, Next.js, Playwright, D1).

inputs:
  task:
    description: Task identifier for the step name (lint, typecheck, test, build, release).
    required: true
  command:
    description: Shell command to execute after install.
    required: true
  github-token:
    description: GitHub token for commands that need it (e.g. semantic-release).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 26
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash

    - name: Run ${{ inputs.task }}
      run: ${{ inputs.command }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
